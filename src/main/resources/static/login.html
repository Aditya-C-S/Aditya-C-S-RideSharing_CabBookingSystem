<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RideShare — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0a0a0f; --surface:#111118; --surface2:#18181f; --surface3:#1e1e28;
    --border:rgba(255,255,255,0.07); --border-hover:rgba(255,255,255,0.18);
    --accent:#7c5cfc; --accent2:#c084fc; --green:#22d3a0;
    --red:#f43f5e; --text:#f0eeff; --muted:#8585a0; --faint:#3a3a50;
  }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; }
  body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px); background-size:48px 48px; pointer-events:none; z-index:0; }

  .login-wrap { position:relative; z-index:1; width:100%; max-width:420px; padding:24px; }

  .logo { text-align:center; margin-bottom:36px; }
  .logo-text { font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:800; letter-spacing:-0.03em; }
  .logo-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--accent); box-shadow:0 0 12px var(--accent); margin-right:8px; animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4)} }
  .logo-sub { color:var(--muted); font-size:0.85rem; margin-top:6px; }

  /* Role selector */
  .role-tabs { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:24px; }
  .role-tab {
    border:1.5px solid var(--border); background:var(--surface2); border-radius:12px;
    padding:14px 8px; cursor:pointer; text-align:center; transition:all 0.18s;
  }
  .role-tab:hover { border-color:var(--border-hover); }
  .role-tab.active { border-color:var(--accent); background:rgba(124,92,252,0.1); }
  .role-emoji { font-size:1.4rem; display:block; margin-bottom:6px; }
  .role-name { font-size:0.8rem; font-weight:600; color:var(--muted); }
  .role-tab.active .role-name { color:var(--accent2); }

  .card { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:28px; }
  .card-title { font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:700; margin-bottom:4px; }
  .card-sub { color:var(--muted); font-size:0.83rem; margin-bottom:24px; }

  .form-group { margin-bottom:16px; }
  label { display:block; font-size:0.72rem; font-weight:600; letter-spacing:0.07em; text-transform:uppercase; color:var(--muted); margin-bottom:7px; }
  input { width:100%; padding:11px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.9rem; outline:none; transition:border-color 0.18s, box-shadow 0.18s; }
  input::placeholder { color:var(--faint); }
  input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(124,92,252,0.12); }

  .btn-login { width:100%; padding:13px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:12px; color:#fff; font-family:'Syne',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:opacity 0.18s, transform 0.18s; margin-top:8px; }
  .btn-login:hover:not(:disabled) { opacity:0.88; transform:translateY(-1px); }
  .btn-login:disabled { opacity:0.4; cursor:not-allowed; }

  .error-msg { display:none; margin-top:14px; padding:10px 14px; border-radius:10px; font-size:0.83rem; text-align:center; background:rgba(244,63,94,0.1); color:var(--red); border:1px solid rgba(244,63,94,0.2); }
  .error-msg.visible { display:block; }

  /* .hint { margin-top:20px; padding:12px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; font-size:0.78rem; color:var(--muted); }
  .hint strong { color:var(--text); display:block; margin-bottom:6px; font-size:0.8rem; }
  .hint-row { display:flex; justify-content:space-between; margin-bottom:3px; }
  .hint-row:last-child { margin-bottom:0; } */
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">
    <div><span class="logo-dot"></span><span class="logo-text">RideShare</span></div>
    <div class="logo-sub">Sign in to continue</div>
  </div>

  <!-- Role picker -->
  <div class="role-tabs">
    <div class="role-tab active" onclick="selectRole('commuter', this)">
      <span class="role-emoji">🧑</span>
      <span class="role-name">Commuter</span>
    </div>
    <div class="role-tab" onclick="selectRole('driver', this)">
      <span class="role-emoji">🚗</span>
      <span class="role-name">Driver</span>
    </div>
    <div class="role-tab" onclick="selectRole('admin', this)">
      <span class="role-emoji">🛡️</span>
      <span class="role-name">Admin</span>
    </div>
  </div>

  <div class="card">
  <div style="display:flex;gap:0;margin-bottom:20px;background:var(--surface2);border-radius:10px;padding:3px;">
  <button id="tab-login" onclick="setMode('login')" style="flex:1;padding:8px;border:none;border-radius:8px;background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;">Sign In</button>
  <button id="tab-signup" onclick="setMode('signup')" style="flex:1;padding:8px;border:none;border-radius:8px;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;">Sign Up</button>
</div>

    <div class="card">
      <div class="card-title" id="card-title">Commuter Login</div>
      <div class="card-sub" id="card-sub">Enter your credentials</div>

      <!-- Sign up only fields -->
      <div id="signup-fields" style="display:none">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" placeholder="Rahul Kumar">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="phone" placeholder="+91 98765 43210">
        </div>
        <div id="license-field" class="form-group" style="display:none">
          <label>License Number</label>
          <input type="text" id="license" placeholder="KA-1234567890">
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••">
      </div>

      <button class="btn-login" id="submit-btn" onclick="handleSubmit()">Sign In</button>
      <div class="error-msg" id="error-msg"></div>
      <div id="success-msg" style="display:none;margin-top:14px;padding:10px 14px;border-radius:10px;font-size:0.83rem;text-align:center;background:rgba(34,211,160,0.1);color:var(--green);border:1px solid rgba(34,211,160,0.2)"></div>
    </div>
  </div>
</div> 

<script>
  const API = 'http://localhost:8080/api';
  let selectedRole = 'commuter';
  let currentMode  = 'login';

  const titles = {
    login:  { commuter: 'Commuter Login',  driver: 'Driver Login',  admin: 'Admin Login'  },
    signup: { commuter: 'Commuter Sign Up', driver: 'Driver Sign Up', admin: null }
  };

  function setMode(mode) {
    currentMode = mode;
    document.getElementById('signup-fields').style.display = mode === 'signup' ? 'block' : 'none';
    document.getElementById('submit-btn').textContent = mode === 'signup' ? 'Create Account' : 'Sign In';
    document.getElementById('tab-login').style.background  = mode === 'login'  ? 'var(--surface)' : 'transparent';
    document.getElementById('tab-login').style.color       = mode === 'login'  ? 'var(--text)'    : 'var(--muted)';
    document.getElementById('tab-signup').style.background = mode === 'signup' ? 'var(--surface)' : 'transparent';
    document.getElementById('tab-signup').style.color      = mode === 'signup' ? 'var(--text)'    : 'var(--muted)';
    document.getElementById('error-msg').classList.remove('visible');
    document.getElementById('success-msg').style.display = 'none';
    // Admin can't sign up
    if (mode === 'signup' && selectedRole === 'admin') {
      selectRole('commuter', document.querySelector('.role-tab'));
    }
    updateTitle();
  }

  function updateTitle() {
    const t = titles[currentMode][selectedRole];
    document.getElementById('card-title').textContent = t || 'Sign Up';
    document.getElementById('card-sub').textContent =
      currentMode === 'signup' ? 'Create your ' + selectedRole + ' account'
                               : 'Enter your ' + selectedRole + ' credentials';
    // Show license field only for driver signup
    const lf = document.getElementById('license-field');
    if (lf) lf.style.display = (currentMode === 'signup' && selectedRole === 'driver') ? 'block' : 'none';
  }

  function selectRole(role, el) {
    if (currentMode === 'signup' && role === 'admin') return; // no admin signup
    selectedRole = role;
    document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('error-msg').classList.remove('visible');
    updateTitle();
  }

  async function handleSubmit() {
    if (currentMode === 'login') await login();
    else await signup();
  }

  async function login() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const errEl    = document.getElementById('error-msg');
    const btn      = document.getElementById('submit-btn');
    errEl.classList.remove('visible');
    if (!email || !password) { errEl.textContent = 'Please enter email and password.'; errEl.classList.add('visible'); return; }
    btn.disabled = true; btn.textContent = 'Signing in...';
    try {
      const res  = await fetch(`${API}/auth/login`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email, password, role: selectedRole })
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error || 'Invalid credentials.'; errEl.classList.add('visible'); btn.disabled=false; btn.textContent='Sign In'; return; }
      sessionStorage.setItem('userId',   data.id);
      sessionStorage.setItem('userName', data.name);
      sessionStorage.setItem('userRole', data.role);
      window.location.href = 'index.html';
    } catch(e) {
      errEl.textContent = 'Could not reach server.'; errEl.classList.add('visible');
      btn.disabled=false; btn.textContent='Sign In';
    }
  }

  async function signup() {
    const name     = document.getElementById('name').value.trim();
    const phone    = document.getElementById('phone').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const license  = document.getElementById('license')?.value.trim();
    const errEl    = document.getElementById('error-msg');
    const sucEl    = document.getElementById('success-msg');
    const btn      = document.getElementById('submit-btn');
    errEl.classList.remove('visible'); sucEl.style.display='none';
    if (!name || !email || !password) { errEl.textContent = 'Name, email and password are required.'; errEl.classList.add('visible'); return; }
    if (selectedRole === 'driver' && !license) { errEl.textContent = 'License number is required for drivers.'; errEl.classList.add('visible'); return; }
    btn.disabled=true; btn.textContent='Creating account...';
    try {
      const res  = await fetch(`${API}/auth/signup`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ name, email, phone, password, role: selectedRole, licenseNumber: license })
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error || 'Sign up failed.'; errEl.classList.add('visible'); btn.disabled=false; btn.textContent='Create Account'; return; }
      sucEl.textContent = '✓ Account created! You can now sign in.';
      sucEl.style.display = 'block';
      btn.disabled=false; btn.textContent='Create Account';
      setTimeout(() => setMode('login'), 1500);
    } catch(e) {
      errEl.textContent = 'Could not reach server.'; errEl.classList.add('visible');
      btn.disabled=false; btn.textContent='Create Account';
    }
  }
</script>
</body>
</html>
