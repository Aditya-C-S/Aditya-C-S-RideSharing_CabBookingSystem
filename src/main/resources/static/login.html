<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RideShare — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0a0a0f; --surface:#111118; --surface2:#18181f; --surface3:#1e1e28;
    --border:rgba(255,255,255,0.07); --border-hover:rgba(255,255,255,0.18);
    --accent:#7c5cfc; --accent2:#c084fc; --green:#22d3a0;
    --red:#f43f5e; --text:#f0eeff; --muted:#8585a0; --faint:#3a3a50;
  }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; }
  body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px); background-size:48px 48px; pointer-events:none; z-index:0; }

  .login-wrap { position:relative; z-index:1; width:100%; max-width:420px; padding:24px; }

  .logo { text-align:center; margin-bottom:36px; }
  .logo-text { font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:800; letter-spacing:-0.03em; }
  .logo-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--accent); box-shadow:0 0 12px var(--accent); margin-right:8px; animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4)} }
  .logo-sub { color:var(--muted); font-size:0.85rem; margin-top:6px; }

  /* Role selector */
  .role-tabs { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:24px; }
  .role-tab {
    border:1.5px solid var(--border); background:var(--surface2); border-radius:12px;
    padding:14px 8px; cursor:pointer; text-align:center; transition:all 0.18s;
  }
  .role-tab:hover { border-color:var(--border-hover); }
  .role-tab.active { border-color:var(--accent); background:rgba(124,92,252,0.1); }
  .role-emoji { font-size:1.4rem; display:block; margin-bottom:6px; }
  .role-name { font-size:0.8rem; font-weight:600; color:var(--muted); }
  .role-tab.active .role-name { color:var(--accent2); }

  .card { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:28px; }
  .card-title { font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:700; margin-bottom:4px; }
  .card-sub { color:var(--muted); font-size:0.83rem; margin-bottom:24px; }

  .form-group { margin-bottom:16px; }
  label { display:block; font-size:0.72rem; font-weight:600; letter-spacing:0.07em; text-transform:uppercase; color:var(--muted); margin-bottom:7px; }
  input { width:100%; padding:11px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.9rem; outline:none; transition:border-color 0.18s, box-shadow 0.18s; }
  input::placeholder { color:var(--faint); }
  input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(124,92,252,0.12); }

  .btn-login { width:100%; padding:13px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:12px; color:#fff; font-family:'Syne',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:opacity 0.18s, transform 0.18s; margin-top:8px; }
  .btn-login:hover:not(:disabled) { opacity:0.88; transform:translateY(-1px); }
  .btn-login:disabled { opacity:0.4; cursor:not-allowed; }

  .error-msg { display:none; margin-top:14px; padding:10px 14px; border-radius:10px; font-size:0.83rem; text-align:center; background:rgba(244,63,94,0.1); color:var(--red); border:1px solid rgba(244,63,94,0.2); }
  .error-msg.visible { display:block; }

  /* .hint { margin-top:20px; padding:12px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; font-size:0.78rem; color:var(--muted); }
  .hint strong { color:var(--text); display:block; margin-bottom:6px; font-size:0.8rem; }
  .hint-row { display:flex; justify-content:space-between; margin-bottom:3px; }
  .hint-row:last-child { margin-bottom:0; } */
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">
    <div><span class="logo-dot"></span><span class="logo-text">RideShare</span></div>
    <div class="logo-sub">Sign in to continue</div>
  </div>

  <!-- Role picker -->
  <div class="role-tabs">
    <div class="role-tab active" onclick="selectRole('commuter', this)">
      <span class="role-emoji">🧑</span>
      <span class="role-name">Commuter</span>
    </div>
    <div class="role-tab" onclick="selectRole('driver', this)">
      <span class="role-emoji">🚗</span>
      <span class="role-name">Driver</span>
    </div>
    <div class="role-tab" onclick="selectRole('admin', this)">
      <span class="role-emoji">🛡️</span>
      <span class="role-name">Admin</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title" id="card-title">Commuter Login</div>
    <div class="card-sub" id="card-sub">Enter your commuter credentials</div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" onkeydown="if(event.key==='Enter') login()">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()">
    </div>

    <button class="btn-login" id="login-btn" onclick="login()">Sign In</button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <!-- Demo credentials hint -->
  <!-- <div class="hint">
    <strong>🔑 Demo credentials</strong>
    <div class="hint-row"><span>Commuter</span><span>rahul@example.com / pass123</span></div>
    <div class="hint-row"><span>Driver</span><span>arjun@example.com / pass123</span></div>
    <div class="hint-row"><span>Admin</span><span>admin@rideshare.com / admin123</span></div>
  </div>
</div> -->

<script>
  const API = 'http://localhost:8080/api';
  let selectedRole = 'commuter';

  const titles = {
    commuter: ['Commuter Login',  'Enter your commuter credentials'],
    driver:   ['Driver Login',    'Enter your driver credentials'],
    admin:    ['Admin Login',     'Enter your admin credentials'],
  };

  function selectRole(role, el) {
    selectedRole = role;
    document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('card-title').textContent = titles[role][0];
    document.getElementById('card-sub').textContent   = titles[role][1];
    document.getElementById('error-msg').classList.remove('visible');
  }

  async function login() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const errEl    = document.getElementById('error-msg');
    const btn      = document.getElementById('login-btn');

    errEl.classList.remove('visible');

    if (!email || !password) {
      errEl.textContent = 'Please enter your email and password.';
      errEl.classList.add('visible');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in...';

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, role: selectedRole })
      });

      const data = await res.json();

      if (!res.ok) {
        errEl.textContent = data.error || 'Invalid email or password.';
        errEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Sign In';
        return;
      }

      // Store session info
      sessionStorage.setItem('userId',   data.id);
      sessionStorage.setItem('userName', data.name);
      sessionStorage.setItem('userRole', data.role);

      // Redirect to index
      window.location.href = 'index.html';

    } catch(e) {
      errEl.textContent = 'Could not reach server. Is Spring Boot running?';
      errEl.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }
</script>
</body>
</html>
