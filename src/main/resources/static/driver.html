<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RideShare — Drivers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0a0a0f; --surface:#111118; --surface2:#18181f; --surface3:#1e1e28;
    --border:rgba(255,255,255,0.07); --border-hover:rgba(255,255,255,0.14);
    --accent:#7c5cfc; --accent2:#c084fc; --green:#22d3a0;
    --amber:#f59e0b; --red:#f43f5e; --text:#f0eeff; --muted:#8585a0; --faint:#3a3a50;
  }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
    background-size:48px 48px; pointer-events:none; z-index:0;
  }
  nav {
    position:sticky; top:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 32px; height:60px;
    background:rgba(10,10,15,0.85); backdrop-filter:blur(16px);
    border-bottom:1px solid var(--border);
  }
  .nav-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.2rem; letter-spacing:-0.02em; color:var(--text); text-decoration:none; display:flex; align-items:center; gap:10px; }
  .nav-logo .dot { width:8px; height:8px; border-radius:50%; background:var(--accent); box-shadow:0 0 10px var(--accent); animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4)} }
  .nav-links { display:flex; gap:4px; list-style:none; }
  .nav-links a { color:var(--muted); text-decoration:none; font-size:0.875rem; font-weight:500; padding:6px 14px; border-radius:8px; transition:all 0.2s; }
  .nav-links a:hover { color:var(--text); background:var(--surface3); }
  .nav-links a.active { color:var(--accent2); background:var(--surface3); }
  .nav-right { display:flex; align-items:center; gap:12px; }
  .badge-role { font-size:0.7rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; padding:3px 10px; border-radius:20px; background:rgba(124,92,252,0.15); color:var(--accent2); border:1px solid rgba(124,92,252,0.3); }
  .avatar { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:0.8rem; font-weight:700; color:#fff; cursor:pointer; }

  .layout { display:flex; min-height:calc(100vh - 60px); position:relative; z-index:1; }
  aside { width:220px; flex-shrink:0; padding:24px 12px; border-right:1px solid var(--border); background:rgba(17,17,24,0.6); backdrop-filter:blur(8px); }
  .sidebar-section { margin-bottom:28px; }
  .sidebar-label { font-size:0.65rem; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--faint); padding:0 12px; margin-bottom:8px; }
  .sidebar-item { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:10px; cursor:pointer; text-decoration:none; color:var(--muted); font-size:0.875rem; font-weight:500; transition:all 0.18s; margin-bottom:2px; }
  .sidebar-item:hover { background:var(--surface3); color:var(--text); }
  .sidebar-item.active { background:rgba(124,92,252,0.15); color:var(--accent2); }
  .sidebar-icon { width:18px; height:18px; opacity:0.7; flex-shrink:0; }
  .sidebar-item.active .sidebar-icon { opacity:1; }

  main { flex:1; padding:32px 40px; overflow-y:auto; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

  .page-header { margin-bottom:28px; animation:fadeUp 0.4s ease both; display:flex; align-items:flex-end; justify-content:space-between; }
  .page-title { font-family:'Syne',sans-serif; font-size:1.9rem; font-weight:700; letter-spacing:-0.03em; margin-bottom:4px; }
  .page-subtitle { color:var(--muted); font-size:0.9rem; }

  .btn {
    padding:10px 20px; border-radius:10px; border:none;
    font-family:'DM Sans',sans-serif; font-size:0.875rem; font-weight:600;
    cursor:pointer; transition:all 0.18s; display:inline-flex; align-items:center; gap:8px;
  }
  .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; }
  .btn-primary:hover { opacity:0.88; transform:translateY(-1px); }
  .btn-ghost { background:var(--surface2); border:1px solid var(--border); color:var(--muted); }
  .btn-ghost:hover { border-color:var(--border-hover); color:var(--text); }
  .btn-danger { background:rgba(244,63,94,0.1); border:1px solid rgba(244,63,94,0.2); color:var(--red); }
  .btn-danger:hover { background:rgba(244,63,94,0.2); }

  .stats-row {
    display:grid; grid-template-columns:repeat(4,1fr); gap:14px;
    margin-bottom:24px; animation:fadeUp 0.4s 0.05s ease both;
  }
  .stat-mini {
    background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:16px 18px;
  }
  .stat-mini-label { font-size:0.72rem; color:var(--muted); font-weight:600; letter-spacing:0.06em; text-transform:uppercase; margin-bottom:8px; }
  .stat-mini-value { font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:700; letter-spacing:-0.04em; }

  .drivers-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; animation:fadeUp 0.4s 0.1s ease both; }

  .driver-card {
    background:var(--surface); border:1px solid var(--border); border-radius:14px;
    overflow:hidden; transition:border-color 0.18s, transform 0.18s;
  }
  .driver-card:hover { border-color:var(--border-hover); transform:translateY(-2px); }

  .driver-card-top {
    padding:20px 20px 16px;
    display:flex; flex-direction:column; align-items:center; text-align:center;
    border-bottom:1px solid var(--border);
    position:relative;
  }

  .driver-status-badge {
    position:absolute; top:14px; right:14px;
    font-size:0.65rem; font-weight:700; letter-spacing:0.06em;
    padding:3px 9px; border-radius:20px;
    text-transform:uppercase;
  }
  .ds-online { background:rgba(34,211,160,0.12); color:var(--green); border:1px solid rgba(34,211,160,0.2); }
  .ds-offline { background:rgba(58,58,80,0.4); color:var(--muted); border:1px solid var(--border); }
  .ds-busy { background:rgba(245,158,11,0.1); color:var(--amber); border:1px solid rgba(245,158,11,0.2); }

  .driver-card-avatar {
    width:60px; height:60px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Syne',sans-serif; font-size:1.4rem; font-weight:700;
    margin-bottom:12px;
  }

  .driver-card-name { font-family:'Syne',sans-serif; font-size:1rem; font-weight:700; margin-bottom:4px; }
  .driver-card-license { font-size:0.75rem; color:var(--muted); font-weight:500; }

  .rating-row {
    display:flex; align-items:center; gap:5px; margin-top:8px;
    justify-content:center;
  }
  .stars { color:var(--amber); font-size:0.8rem; }
  .rating-val { font-size:0.82rem; font-weight:600; }

  .driver-card-body { padding:16px 20px; }

  .driver-stat-row {
    display:flex; justify-content:space-between; margin-bottom:10px;
    font-size:0.8rem;
  }
  .driver-stat-row:last-child { margin-bottom:0; }
  .ds-label { color:var(--muted); }
  .ds-val { font-weight:600; }

  .driver-card-actions { padding:0 16px 16px; display:flex; gap:8px; }

  /* ADD DRIVER MODAL */
  .modal-backdrop {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.7); backdrop-filter:blur(6px);
    z-index:200; align-items:center; justify-content:center;
  }
  .modal-backdrop.open { display:flex; }

  .modal {
    background:var(--surface); border:1px solid var(--border-hover);
    border-radius:18px; width:460px; max-width:92vw;
    animation:modalIn 0.3s ease;
  }

  @keyframes modalIn { from{opacity:0;transform:scale(0.95) translateY(20px)} to{opacity:1;transform:none} }

  .modal-header {
    padding:22px 24px 16px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .modal-title { font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:700; }
  .modal-close { background:var(--surface2); border:none; color:var(--muted); width:30px; height:30px; border-radius:8px; cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
  .modal-close:hover { color:var(--text); }

  .modal-body { padding:22px 24px; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .form-group { margin-bottom:16px; }
  .form-group:last-child { margin-bottom:0; }
  label { display:block; font-size:0.75rem; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); margin-bottom:7px; }
  input, select { width:100%; padding:10px 13px; background:var(--surface2); border:1px solid var(--border); border-radius:9px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.88rem; outline:none; transition:border-color 0.18s; -webkit-appearance:none; }
  input::placeholder { color:var(--faint); }
  input:focus, select:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(124,92,252,0.12); }
  select option { background:var(--surface2); }

  .modal-footer { padding:0 24px 22px; }

  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--faint); border-radius:3px; }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo"><div class="dot"></div>RideShare</a>
  <ul class="nav-links">
    <li><a href="index.html">Overview</a></li>
    <li><a href="commuter.html">Book a Ride</a></li>
    <li><a href="driver.html" class="active">Drivers</a></li>
    <li><a href="admin.html">Admin</a></li>
    <li><a href="payments.html">Payments</a></li>
  </ul>
  <div class="nav-right">
    <span class="badge-role">Admin</span>
    <div class="avatar">AD</div>
  </div>
</nav>

<div class="layout">
  <aside>
    <div class="sidebar-section">
      <div class="sidebar-label">Management</div>
      <a href="driver.html" class="sidebar-item active">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        All Drivers
      </a>
      <a href="admin.html" class="sidebar-item">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        Dashboard
      </a>
    </div>
  </aside>

  <main>
    <div class="page-header">
      <div>
        <h1 class="page-title">Drivers</h1>
        <p class="page-subtitle">Manage and monitor all registered drivers.</p>
      </div>
      <button class="btn btn-primary" onclick="openModal()">
        <span>+</span> Add Driver
      </button>
    </div>

    <div class="stats-row">
      <div class="stat-mini">
        <div class="stat-mini-label">Total Drivers</div>
        <div class="stat-mini-value">8</div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-label" style="color:var(--green)">Online Now</div>
        <div class="stat-mini-value" style="color:var(--green)">3</div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-label" style="color:var(--amber)">On a Ride</div>
        <div class="stat-mini-value" style="color:var(--amber)">2</div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-label">Avg Rating</div>
        <div class="stat-mini-value">4.6 ⭐</div>
      </div>
    </div>

    <div class="drivers-grid" id="drivers-grid">
      <!-- Populated by JS -->
    </div>
  </main>
</div>

<!-- Add Driver Modal -->
<div class="modal-backdrop" id="add-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Add New Driver</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" placeholder="e.g. Arjun" id="d-fname">
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" placeholder="e.g. Kumar" id="d-lname">
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="driver@example.com" id="d-email">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" placeholder="+91 98765 43210" id="d-phone">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>License Number</label>
          <input type="text" placeholder="KA-1234567890" id="d-license">
        </div>
        <div class="form-group">
          <label>Vehicle Type</label>
          <select id="d-vtype">
            <option>Sedan</option>
            <option>SUV</option>
            <option>Auto</option>
          </select>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label>License Plate</label>
        <input type="text" placeholder="KA-01-AB-1234" id="d-plate">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" style="width:100%" onclick="addDriver()">Add Driver</button>
    </div>
  </div>
</div>

<script>
  const colorSets = [
    {bg:'rgba(124,92,252,0.18)',color:'#c084fc'},
    {bg:'rgba(34,211,160,0.12)',color:'#22d3a0'},
    {bg:'rgba(245,158,11,0.12)',color:'#f59e0b'},
    {bg:'rgba(244,63,94,0.1)',color:'#f43f5e'},
    {bg:'rgba(56,189,248,0.1)',color:'#38bdf8'},
    {bg:'rgba(251,146,60,0.1)',color:'#fb923c'},
  ];

  let drivers = [
    {name:'Arjun Kumar',  license:'KA-1234567890', plate:'KA-01-AB-1234', type:'Sedan', status:'online', rides:142, rating:4.8},
    {name:'Priya Sharma', license:'KA-2345678901', plate:'KA-02-CD-5678', type:'SUV',   status:'busy',   rides:98,  rating:4.6},
    {name:'Ravi Menon',   license:'KA-3456789012', plate:'KA-03-EF-9012', type:'Auto',  status:'offline',rides:76,  rating:4.5},
    {name:'Kavya Reddy',  license:'KA-4567890123', plate:'KA-04-GH-3456', type:'Sedan', status:'online', rides:210, rating:4.9},
    {name:'Suresh Nair',  license:'KA-5678901234', plate:'KA-05-IJ-7890', type:'SUV',   status:'busy',   rides:55,  rating:4.3},
    {name:'Deepa Raj',    license:'KA-6789012345', plate:'KA-06-KL-1234', type:'Auto',  status:'offline',rides:33,  rating:4.7},
  ];

  function initials(name) {
    return name.split(' ').map(n => n[0]).join('');
  }

  function renderDrivers() {
    const grid = document.getElementById('drivers-grid');
    grid.innerHTML = drivers.map((d, i) => {
      const c = colorSets[i % colorSets.length];
      const statusClass = d.status === 'online' ? 'ds-online' : d.status === 'busy' ? 'ds-busy' : 'ds-offline';
      const statusLabel = d.status === 'online' ? 'Online' : d.status === 'busy' ? 'On Ride' : 'Offline';
      const stars = '★'.repeat(Math.floor(d.rating)) + (d.rating % 1 >= 0.5 ? '½' : '');
      return `
        <div class="driver-card">
          <div class="driver-card-top">
            <span class="driver-status-badge ${statusClass}">${statusLabel}</span>
            <div class="driver-card-avatar" style="background:${c.bg};color:${c.color}">${initials(d.name)}</div>
            <div class="driver-card-name">${d.name}</div>
            <div class="driver-card-license">${d.license}</div>
            <div class="rating-row">
              <span class="stars">${'★'.repeat(Math.floor(d.rating))}</span>
              <span class="rating-val">${d.rating}</span>
            </div>
          </div>
          <div class="driver-card-body">
            <div class="driver-stat-row"><span class="ds-label">Vehicle</span><span class="ds-val">${d.type}</span></div>
            <div class="driver-stat-row"><span class="ds-label">Plate</span><span class="ds-val">${d.plate}</span></div>
            <div class="driver-stat-row"><span class="ds-label">Total Rides</span><span class="ds-val">${d.rides}</span></div>
          </div>
          <div class="driver-card-actions">
            <button class="btn btn-ghost" style="flex:1;font-size:0.78rem;padding:8px 10px">View</button>
            <button class="btn btn-danger" style="flex:1;font-size:0.78rem;padding:8px 10px" onclick="removeDriver(${i})">Remove</button>
          </div>
        </div>
      `;
    }).join('');
  }

  function removeDriver(i) {
    drivers.splice(i, 1);
    renderDrivers();
  }

  function openModal() { document.getElementById('add-modal').classList.add('open'); }
  function closeModal() { document.getElementById('add-modal').classList.remove('open'); }

  function addDriver() {
    const fname = document.getElementById('d-fname').value;
    const lname = document.getElementById('d-lname').value;
    const license = document.getElementById('d-license').value;
    const plate = document.getElementById('d-plate').value;
    const vtype = document.getElementById('d-vtype').value;
    if (!fname || !lname || !license || !plate) { alert('Please fill in all required fields.'); return; }
    drivers.push({ name: `${fname} ${lname}`, license, plate, type: vtype, status: 'offline', rides: 0, rating: 5.0 });
    renderDrivers();
    closeModal();
  }

  document.getElementById('add-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  renderDrivers();
</script>
</body>
</html>
