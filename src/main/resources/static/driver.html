<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RideShare — Drivers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0a0a0f; --surface:#111118; --surface2:#18181f; --surface3:#1e1e28;
    --border:rgba(255,255,255,0.07); --border-hover:rgba(255,255,255,0.14);
    --accent:#7c5cfc; --accent2:#c084fc; --green:#22d3a0;
    --amber:#f59e0b; --red:#f43f5e; --text:#f0eeff; --muted:#8585a0; --faint:#3a3a50;
  }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px); background-size:48px 48px; pointer-events:none; z-index:0; }
  nav { position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:0 32px; height:60px; background:rgba(10,10,15,0.85); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); }
  .nav-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.2rem; letter-spacing:-0.02em; color:var(--text); text-decoration:none; display:flex; align-items:center; gap:10px; }
  .nav-logo .dot { width:8px; height:8px; border-radius:50%; background:var(--accent); box-shadow:0 0 10px var(--accent); animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4)} }
  .nav-links { display:flex; gap:4px; list-style:none; }
  .nav-links a { color:var(--muted); text-decoration:none; font-size:0.875rem; font-weight:500; padding:6px 14px; border-radius:8px; transition:all 0.2s; }
  .nav-links a:hover { color:var(--text); background:var(--surface3); }
  .nav-links a.active { color:var(--accent2); background:var(--surface3); }
  .nav-right { display:flex; align-items:center; gap:12px; }
  .badge-role { font-size:0.7rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; padding:3px 10px; border-radius:20px; background:rgba(124,92,252,0.15); color:var(--accent2); border:1px solid rgba(124,92,252,0.3); }
  .avatar { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:0.8rem; font-weight:700; color:#fff; }

  .layout { display:flex; min-height:calc(100vh - 60px); position:relative; z-index:1; }
  aside { width:220px; flex-shrink:0; padding:24px 12px; border-right:1px solid var(--border); background:rgba(17,17,24,0.6); }
  .sidebar-section { margin-bottom:28px; }
  .sidebar-label { font-size:0.65rem; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--faint); padding:0 12px; margin-bottom:8px; }
  .sidebar-item { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:10px; cursor:pointer; text-decoration:none; color:var(--muted); font-size:0.875rem; font-weight:500; transition:all 0.18s; margin-bottom:2px; }
  .sidebar-item:hover { background:var(--surface3); color:var(--text); }
  .sidebar-item.active { background:rgba(124,92,252,0.15); color:var(--accent2); }
  .sidebar-icon { width:18px; height:18px; opacity:0.7; flex-shrink:0; }

  main { flex:1; padding:32px 40px; overflow-y:auto; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

  .page-header { margin-bottom:24px; animation:fadeUp 0.4s ease both; display:flex; align-items:flex-end; justify-content:space-between; }
  .page-title { font-family:'Syne',sans-serif; font-size:1.9rem; font-weight:700; letter-spacing:-0.03em; margin-bottom:4px; }
  .page-subtitle { color:var(--muted); font-size:0.9rem; }

  .btn { padding:10px 20px; border-radius:10px; border:none; font-family:'DM Sans',sans-serif; font-size:0.875rem; font-weight:600; cursor:pointer; transition:all 0.18s; display:inline-flex; align-items:center; gap:8px; }
  .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; }
  .btn-primary:hover { opacity:0.88; transform:translateY(-1px); }
  .btn-ghost { background:var(--surface2); border:1px solid var(--border); color:var(--muted); }
  .btn-ghost:hover { border-color:var(--border-hover); color:var(--text); }
  .btn-danger { background:rgba(244,63,94,0.1); border:1px solid rgba(244,63,94,0.2); color:var(--red); }
  .btn-danger:hover { background:rgba(244,63,94,0.2); }
  .btn-success { background:rgba(34,211,160,0.1); border:1px solid rgba(34,211,160,0.2); color:var(--green); }
  .btn-success:hover { background:rgba(34,211,160,0.2); }

  .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px; animation:fadeUp 0.4s 0.05s ease both; }
  .stat-mini { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 18px; }
  .stat-mini-label { font-size:0.72rem; color:var(--muted); font-weight:600; letter-spacing:0.06em; text-transform:uppercase; margin-bottom:8px; }
  .stat-mini-value { font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:700; letter-spacing:-0.04em; }

  .drivers-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; animation:fadeUp 0.4s 0.1s ease both; }

  .driver-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; transition:border-color 0.18s, transform 0.18s; }
  .driver-card:hover { border-color:var(--border-hover); transform:translateY(-2px); }

  .driver-card-top { padding:20px 20px 16px; display:flex; flex-direction:column; align-items:center; text-align:center; border-bottom:1px solid var(--border); position:relative; }

  .driver-status-badge { position:absolute; top:14px; right:14px; font-size:0.65rem; font-weight:700; letter-spacing:0.06em; padding:3px 9px; border-radius:20px; text-transform:uppercase; }
  .ds-online  { background:rgba(34,211,160,0.12); color:var(--green); border:1px solid rgba(34,211,160,0.2); }
  .ds-offline { background:rgba(58,58,80,0.4); color:var(--muted); border:1px solid var(--border); }
  .ds-busy    { background:rgba(245,158,11,0.1); color:var(--amber); border:1px solid rgba(245,158,11,0.2); }

  .driver-card-avatar { width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-size:1.4rem; font-weight:700; margin-bottom:12px; }
  .driver-card-name { font-family:'Syne',sans-serif; font-size:1rem; font-weight:700; margin-bottom:4px; }
  .driver-card-license { font-size:0.75rem; color:var(--muted); }

  .driver-card-body { padding:14px 20px; }
  .driver-stat-row { display:flex; justify-content:space-between; margin-bottom:8px; font-size:0.8rem; }
  .driver-stat-row:last-child { margin-bottom:0; }
  .ds-label { color:var(--muted); }
  .ds-val { font-weight:600; }

  .driver-card-actions { padding:0 16px 16px; display:flex; gap:8px; }

  /* TOGGLE SWITCH */
  .toggle-wrap { display:flex; align-items:center; gap:8px; padding:0 20px 14px; }
  .toggle-label { font-size:0.78rem; font-weight:500; color:var(--muted); flex:1; }
  .toggle { position:relative; width:40px; height:22px; flex-shrink:0; }
  .toggle input { opacity:0; width:0; height:0; }
  .toggle-slider { position:absolute; cursor:pointer; inset:0; background:var(--surface3); border-radius:22px; transition:background 0.2s; border:1px solid var(--border); }
  .toggle-slider::before { content:''; position:absolute; width:16px; height:16px; left:2px; top:2px; background:var(--muted); border-radius:50%; transition:transform 0.2s, background 0.2s; }
  input:checked + .toggle-slider { background:rgba(34,211,160,0.2); border-color:rgba(34,211,160,0.4); }
  input:checked + .toggle-slider::before { transform:translateX(18px); background:var(--green); }

  /* MODAL */
  .modal-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(6px); z-index:200; align-items:center; justify-content:center; }
  .modal-backdrop.open { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border-hover); border-radius:18px; width:460px; max-width:92vw; animation:modalIn 0.3s ease; }
  @keyframes modalIn { from{opacity:0;transform:scale(0.95) translateY(20px)} to{opacity:1;transform:none} }
  .modal-header { padding:22px 24px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .modal-title { font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:700; }
  .modal-close { background:var(--surface2); border:none; color:var(--muted); width:30px; height:30px; border-radius:8px; cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center; }
  .modal-close:hover { color:var(--text); }
  .modal-body { padding:22px 24px; }
  .modal-footer { padding:0 24px 22px; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .form-group { margin-bottom:14px; }
  label { display:block; font-size:0.75rem; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); margin-bottom:7px; }
  input, select { width:100%; padding:10px 13px; background:var(--surface2); border:1px solid var(--border); border-radius:9px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.88rem; outline:none; transition:border-color 0.18s; -webkit-appearance:none; }
  input::placeholder { color:var(--faint); }
  input:focus, select:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(124,92,252,0.12); }
  select option { background:var(--surface2); }

  .empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
  .empty-state div { font-size:2rem; margin-bottom:12px; }

  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--faint); border-radius:3px; }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo"><div class="dot"></div>RideShare</a>
  <ul class="nav-links">
    <li><a href="index.html">Overview</a></li>
    <li><a href="driver.html" class="active">Drivers</a></li>
    <!-- <li><a href="commuter.html">Book a Ride</a></li> -->
    <!-- <li><a href="admin.html">Admin</a></li>
    <li><a href="payments.html">Payments</a></li> -->
  </ul>
  <div class="nav-right">
    <span class="badge-role">Driver</span>
    <div class="avatar" onclick="logout()" title="Logout" style="cursor:pointer">DV</div>
  </div>
</nav>

<div class="layout">
  <aside>
    <div class="sidebar-section">
      <div class="sidebar-label">Management</div>
      <a href="driver.html" class="sidebar-item active">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        All Drivers
      </a>
    </div>
  </aside>

  <main>
    <div class="page-header">
      <div>
        <h1 class="page-title">Drivers</h1>
        <p class="page-subtitle">Manage drivers and toggle their availability.</p>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost" onclick="loadDrivers()">↻ Refresh</button>
        <button class="btn btn-primary" onclick="openModal()">+ Add Driver</button>
      </div>
    </div>

    <!-- Pending / Active Rides Panel — only shown to drivers -->
    <div id="my-rides-panel" style="display:none;margin-bottom:28px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <span style="font-family:'Syne',sans-serif;font-size:1rem;font-weight:700">My Rides</span>
        <button onclick="loadMyRides()" style="padding:6px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:0.8rem;cursor:pointer">↻ Refresh</button>
      </div>
      <div id="my-rides-list"></div>
    </div>

    <div class="stats-row">
      <div class="stat-mini">
        <div class="stat-mini-label">Total</div>
        <div class="stat-mini-value" id="stat-total">—</div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-label" style="color:var(--green)">Available</div>
        <div class="stat-mini-value" style="color:var(--green)" id="stat-available">—</div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-label" style="color:var(--amber)">On a Ride</div>
        <div class="stat-mini-value" style="color:var(--amber)" id="stat-busy">—</div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-label">DB Status</div>
        <div class="stat-mini-value" id="stat-db" style="font-size:0.9rem;margin-top:4px">Checking...</div>
      </div>
    </div>

    <div id="drivers-grid" class="drivers-grid"></div>
  </main>
</div>

<!-- Add Driver Modal -->
<div class="modal-backdrop" id="add-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Add New Driver</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>First Name</label><input type="text" id="d-fname" placeholder="Arjun"></div>
        <div class="form-group"><label>Last Name</label><input type="text" id="d-lname" placeholder="Kumar"></div>
      </div>
      <div class="form-group"><label>Email</label><input type="email" id="d-email" placeholder="arjun@example.com"></div>
      <div class="form-group"><label>Phone</label><input type="tel" id="d-phone" placeholder="+91 98765 43210"></div>
      <div class="form-row">
        <div class="form-group"><label>License Number</label><input type="text" id="d-license" placeholder="KA-1234567890"></div>
        <div class="form-group"><label>Password</label><input type="password" id="d-password" placeholder="••••••••"></div>
      </div>
      <div style="background:rgba(34,211,160,0.07);border:1px solid rgba(34,211,160,0.15);border-radius:10px;padding:12px 14px;font-size:0.8rem;color:var(--green)">
        ✓ New drivers are set to <strong>Available</strong> by default — they can immediately receive rides.
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" style="width:100%" onclick="addDriver()">Add Driver to System</button>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:8080/api';
  if (!sessionStorage.getItem('userId')) window.location.href = 'login.html';
  const _srole = sessionStorage.getItem('userRole');
  if (_srole !== 'driver' && _srole !== 'admin') { alert('Access denied.'); window.location.href = 'login.html'; }
  const _avatar = document.querySelector('.avatar');
  if (_avatar) {
    _avatar.style.cursor = 'pointer';
    _avatar.title = 'Logout — ' + (sessionStorage.getItem('userName') || '');
    _avatar.onclick = () => { sessionStorage.clear(); window.location.href = 'login.html'; };
  }
  const _badge = document.querySelector('.badge-role');
  if (_badge) _badge.textContent = sessionStorage.getItem('userRole') || 'Guest';

  const colorSets = [
    {bg:'rgba(124,92,252,0.18)',color:'#c084fc'},
    {bg:'rgba(34,211,160,0.12)',color:'#22d3a0'},
    {bg:'rgba(245,158,11,0.12)',color:'#f59e0b'},
    {bg:'rgba(244,63,94,0.1)',color:'#f43f5e'},
    {bg:'rgba(56,189,248,0.1)',color:'#38bdf8'},
    {bg:'rgba(251,146,60,0.1)',color:'#fb923c'},
  ];

  function initials(name) {
    return (name || '??').split(' ').map(n => n[0]).join('').toUpperCase();
  }

  const _driverId   = sessionStorage.getItem('userId');
  const _driverRole = sessionStorage.getItem('userRole');

  if (_driverRole === 'driver') {
    document.getElementById('my-rides-panel').style.display = 'block';
    loadMyRides();
    setInterval(loadMyRides, 5000); // auto-refresh every 5s
  }

  async function loadMyRides() {
    const list = document.getElementById('my-rides-list');
    if (!list) return;
    try {
      const res  = await fetch(`${API}/rides/driver/${_driverId}`);
      const rides = await res.json();
      const active = rides.filter(r => r.status === 'DRIVER_ASSIGNED' || r.status === 'IN_PROGRESS');
      if (!active.length) {
        list.innerHTML = '<div style="color:var(--muted);font-size:0.85rem;padding:12px 0">No active rides assigned to you.</div>';
        return;
      }
      list.innerHTML = active.map(r => `
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div>
            <div style="font-weight:600;font-size:0.9rem">Ride #${r.id}</div>
            <div style="color:var(--muted);font-size:0.8rem;margin-top:3px">${r.pickupLocation} → ${r.dropLocation}</div>
            <div style="font-size:0.75rem;margin-top:4px;color:${r.status === 'DRIVER_ASSIGNED' ? 'var(--amber)' : 'var(--green)'}">
              ${r.status === 'DRIVER_ASSIGNED' ? '⏳ Awaiting your acceptance' : '🚗 Ride in progress'}
            </div>
          </div>
          <div>
            ${r.status === 'DRIVER_ASSIGNED' ? `
              <button onclick="acceptRide(${r.id})"
                style="padding:9px 18px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:9px;color:#fff;font-weight:700;font-size:0.82rem;cursor:pointer">
                Accept Ride
              </button>` : `
              <button onclick="completeRide(${r.id})"
                style="padding:9px 18px;background:rgba(34,211,160,0.15);border:1px solid var(--green);border-radius:9px;color:var(--green);font-weight:700;font-size:0.82rem;cursor:pointer">
                Mark Complete
              </button>`}
          </div>
        </div>
      `).join('');
    } catch(e) {
      list.innerHTML = '<div style="color:var(--red);font-size:0.85rem">Failed to load rides.</div>';
    }
  }

  async function acceptRide(rideId) {
    try {
      await fetch(`${API}/rides/${rideId}/accept`, { method: 'POST' });
      loadMyRides();  // refresh panel
      loadDrivers();  // refresh grid so badge turns amber
    } catch(e) {
      alert('Failed to accept ride.');
    }
  }

  async function completeRide(rideId) {
    try {
      await fetch(`${API}/rides/${rideId}/end`, { method: 'POST' });
      loadMyRides();  // panel clears
      loadDrivers();  // badge turns green again
    } catch(e) {
      alert('Failed to complete ride.');
    }
  }

  async function loadDrivers() {
    const grid = document.getElementById('drivers-grid');
    grid.innerHTML = '<div style="color:var(--muted);font-size:0.85rem;padding:20px">Loading from database...</div>';

    try {
      const res = await fetch(`${API}/drivers`);
      if (!res.ok) throw new Error('Server returned ' + res.status);
      const drivers = await res.json();

      document.getElementById('stat-total').textContent     = drivers.length;
      document.getElementById('stat-available').textContent = drivers.filter(d => d.available).length;
      document.getElementById('stat-busy').textContent      = drivers.filter(d => !d.available).length;
      document.getElementById('stat-db').textContent        = '✓ Live';
      document.getElementById('stat-db').style.color        = 'var(--green)';

      if (!drivers.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div>🚗</div>No drivers in the database yet.<br>Click <strong>+ Add Driver</strong> to add the first one.</div>`;
        return;
      }

      grid.innerHTML = drivers.map((d, i) => {
        const c = colorSets[i % colorSets.length];
        const statusClass = d.available ? 'ds-online' : 'ds-busy';
        const statusLabel = d.available ? 'Available' : 'On Ride';
        return `
          <div class="driver-card" id="card-${d.id}">
            <div class="driver-card-top">
              <span class="driver-status-badge ${statusClass}" id="badge-${d.id}">${statusLabel}</span>
              <div class="driver-card-avatar" style="background:${c.bg};color:${c.color}">${initials(d.name)}</div>
              <div class="driver-card-name">${d.name}</div>
              <div class="driver-card-license">${d.licenseNumber || 'No license'}</div>
            </div>
            <div class="driver-card-body">
              <div class="driver-stat-row"><span class="ds-label">Email</span><span class="ds-val" style="font-size:0.75rem">${d.email || '—'}</span></div>
              <div class="driver-stat-row"><span class="ds-label">Phone</span><span class="ds-val">${d.phone || '—'}</span></div>
              <div class="driver-stat-row"><span class="ds-label">Status</span><span class="ds-val" id="status-text-${d.id}" style="color:${d.available?'var(--green)':'var(--amber)'}">${d.available ? 'Available for rides' : 'Currently on a ride'}</span></div>
            </div>
            <div class="toggle-wrap">
              <span class="toggle-label">Set as Available</span>
              <label class="toggle">
                <input type="checkbox" ${d.available ? 'checked' : ''} onchange="toggleAvailability(${d.id}, this.checked)">
                <span class="toggle-slider"></span>
              </label>
            </div>
            <div class="driver-card-actions">
              <button class="btn btn-danger" style="flex:1;font-size:0.78rem;padding:8px 10px" onclick="removeDriver(${d.id})">Remove</button>
            </div>
          </div>
        `;
      }).join('');

    } catch (err) {
      grid.innerHTML = `<div style="color:var(--red);font-size:0.85rem;padding:20px;grid-column:1/-1">Could not connect to backend: ${err.message}<br><br>Make sure <code>mvn spring-boot:run</code> is running.</div>`;
      document.getElementById('stat-db').textContent = '✕ Offline';
      document.getElementById('stat-db').style.color = 'var(--red)';
    }
  }

  async function toggleAvailability(id, available) {
    try {
      const res = await fetch(`${API}/drivers/${id}/availability?available=${available}`, { method:'PATCH' });
      if (!res.ok) throw new Error();
      const driver = await res.json();

      const badge = document.getElementById('badge-' + id);
      const statusText = document.getElementById('status-text-' + id);

      if (driver.available) {
        badge.className = 'driver-status-badge ds-online';
        badge.textContent = 'Available';
        statusText.textContent = 'Available for rides';
        statusText.style.color = 'var(--green)';
      } else {
        badge.className = 'driver-status-badge ds-busy';
        badge.textContent = 'On Ride';
        statusText.textContent = 'Currently on a ride';
        statusText.style.color = 'var(--amber)';
      }

      // Update stat counts
      loadDrivers();
    } catch (err) {
      alert('Failed to update availability. Server may be offline.');
    }
  }

  async function removeDriver(id) {
    if (!confirm('Remove this driver from the system?')) return;
    try {
      await fetch(`${API}/drivers/${id}`, { method:'DELETE' });
      loadDrivers();
    } catch (err) {
      alert('Failed to remove driver.');
    }
  }

  function openModal()  { document.getElementById('add-modal').classList.add('open'); }
  function closeModal() { document.getElementById('add-modal').classList.remove('open'); }

  async function addDriver() {
    const fname    = document.getElementById('d-fname').value.trim();
    const lname    = document.getElementById('d-lname').value.trim();
    const email    = document.getElementById('d-email').value.trim();
    const phone    = document.getElementById('d-phone').value.trim();
    const license  = document.getElementById('d-license').value.trim();
    const password = document.getElementById('d-password').value.trim();

    if (!fname || !lname || !email || !license || !password) {
      alert('Please fill in all fields.'); return;
    }

    try {
      const res = await fetch(`${API}/drivers`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: fname + ' ' + lname,
          email, phone, password,
          licenseNumber: license,
          available: true
        })
      });
      if (!res.ok) throw new Error('Server error ' + res.status);
      closeModal();
      // Clear fields
      ['d-fname','d-lname','d-email','d-phone','d-license','d-password'].forEach(id => document.getElementById(id).value = '');
      loadDrivers();
    } catch (err) {
      alert('Failed to add driver: ' + err.message);
    }
  }

  document.getElementById('add-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  // Load on page open
  loadDrivers();
</script>
<script>
  // Redirect to login if not authenticated
  if (!sessionStorage.getItem('userId')) {
    window.location.href = 'login.html';
  }

  // ── Role-based nav/sidebar hiding ──────────────────────────
  (function applyRoleVisibility() {
    const role = sessionStorage.getItem('userRole');
    if (!role) return;

    const rules = {
      commuter: ['driver.html', 'admin.html', 'payments.html'],
      driver:   ['commuter.html', 'admin.html', 'payments.html']
      // admin sees everything — no rules
    };

    const hidden = rules[role] || [];
    hidden.forEach(page => {
      document.querySelectorAll(`a[href="${page}"]`).forEach(a => {
        // hide the <li> if it's a nav link, else hide the <a> itself (sidebar)
        const target = a.closest('li') || a;
        target.style.display = 'none';
      });
    });
  })();

  // Show user name in nav
  const userName = sessionStorage.getItem('userName');
  const userRole = sessionStorage.getItem('userRole');
  const avatarEl = document.querySelector('.avatar');
  if (avatarEl && userName) {
    avatarEl.textContent = userName.split(' ').map(n => n[0]).join('').toUpperCase();
    avatarEl.title = userName + ' (' + userRole + ')';
  }

  function logout() {
    sessionStorage.clear();
    window.location.href = 'login.html';
  }
</script>
</body>
